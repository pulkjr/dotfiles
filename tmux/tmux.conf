##### XDG plugin path #####
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins"

##### Load modular configs #####
source-file ~/.config/tmux/conf.d/options.conf
source-file ~/.config/tmux/conf.d/bindings.conf
source-file ~/.config/tmux/conf.d/theme.conf

##### Plugins #####
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'odedlaz/tmux-onedark-theme'

##### TPM initialization (must be last) #####
run-shell "$HOME/.config/tmux/plugins/tpm/tpm"

##### Post-plugin widgets (run after TPM so tmux-onedark status-right is set first) #####
run-shell "$HOME/.config/tmux/plugins/task-timew/task-timew.tmux"

##### Post-plugin style overrides (re-apply after tmux-onedark overrides window-active-style) #####
set -g window-active-style 'fg=#abb2bf,bg=#282c34'
set -g pane-border-style        'fg=#3e4452'
set -g pane-active-border-style 'fg=#61afef,bold'
set -g @dim_mode "on"

