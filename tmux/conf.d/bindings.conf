##### Prefix #####
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### Toggle status bar (prefix + S) #####
bind S run-shell "tmux setw -g status \$(tmux show -g -w status | grep -q off && echo on || echo off)"

##### Pane navigation — vim Ctrl+w style (prefix + h/j/k/l) #####
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

##### Pane splits #####
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

##### Pane resizing (prefix + H/J/K/U) #####
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### Copy mode (vi) #####
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
# y — yank selection to tmux buffer AND macOS system clipboard (pbcopy)
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"
# Y — yank entire current line to clipboard
bind -T copy-mode-vi Y   send -X copy-line \; run-shell "tmux save-buffer - | pbcopy"
bind -T copy-mode-vi Escape send -X cancel
# Mouse drag selection → also send to system clipboard on release
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

##### Toggle inactive pane dimming (prefix + D) #####
# Toggles window-style between dim and default. Useful when you need full brightness.
bind D run-shell '\
  cur=$(tmux show -gv window-style 2>/dev/null); \
  if [ "$cur" = "default" ]; then \
    tmux set -g window-style "bg=#21252b" && \
    tmux set -g window-active-style "bg=#282c34" && \
    tmux display "Dim: ON"; \
  else \
    tmux set -g window-style "default" && \
    tmux set -g window-active-style "default" && \
    tmux display "Dim: OFF"; \
  fi'

##### Reload config (prefix + r) #####
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

