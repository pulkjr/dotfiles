##### One Dark theme settings #####
set -g @onedark_time_format "%H:%M"
set -g @onedark_date_format "%d/%m/%Y"
# Battery widget (macOS via pmset). Shows e.g. "  82%"
set -g @onedark_widgets "#(pmset -g batt 2>/dev/null | grep -o '[0-9]*%' | head -1 | xargs -I{} printf '  {}')"

# Status bar update interval
set -g status-interval 5

##### Pane borders — One Dark palette #####
# Active pane: bold blue border so it's immediately obvious which pane has focus
# Inactive panes: subtle gutter color — visible but not distracting
set -g pane-border-style        'fg=#3e4452'
set -g pane-active-border-style 'fg=#61afef,bold'

##### Prefix+q pane number display (display-panes) #####
set -g display-panes-time          2000
set -g display-panes-colour        '#3e4452'
set -g display-panes-active-colour '#61afef'
